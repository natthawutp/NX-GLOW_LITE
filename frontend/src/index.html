<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Enterprise Warehouse Management System">
  <title>Warehouse Management System</title>
  <base href="/">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%231A005D'/%3E%3Cpath d='M8 12L16 8L24 12V20L16 24L8 20V12Z' stroke='%238EC400' stroke-width='2' fill='none'/%3E%3Ccircle cx='16' cy='16' r='3' fill='%238EC400'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>
  <wms-root></wms-root>

  <!-- Loading screen shown before Angular bootstraps -->
  <style>
    .app-loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f8f9fc;
      z-index: 9999;
      font-family: 'Inter', system-ui, sans-serif;
    }
    .app-loading .logo-text {
      font-size: 28px;
      font-weight: 800;
      color: #1A005D;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    .app-loading .logo-sub {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 32px;
    }
    .app-loading .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e4e7f0;
      border-top-color: #1A005D;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
  <div class="app-loading" id="app-loading">
    <div class="logo-text">GWH WMS</div>
    <div class="logo-sub">Enterprise Warehouse Management</div>
    <div class="spinner"></div>
  </div>
  <script>
    // Remove loading screen once Angular app is ready
    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(function() {
        var el = document.getElementById('app-loading');
        if (el) el.style.display = 'none';
      }, 100);
    });
  </script>
</body>
</html>
