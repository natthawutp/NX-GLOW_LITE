# Common
ERR0174=No data found
ERR0216=Required field is empty: {0}
ERR0285=Data has been changed by another user. Please refresh and try again.
ERR1012=Failed to read data: {0}
ERR1013=Failed to insert data: {0}
ERR1014=Failed to update data: {0}
ERR4214=You do not have permission to access this store
