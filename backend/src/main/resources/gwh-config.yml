# ============================================================
# GWH Master Configuration
# Comprehensive configuration derived from GWH Legacy WMS
# (GwhCommon cm* modules) mapped to GWH Modern WMS.
#
# Source: GWH_Git/GWH/GwhCommon/GwhCommon-api/.../common/cm/
# Tables: SGWH0001.GWH_TM_* (Master Tables)
#
# Bind with: @ConfigurationProperties(prefix = "gwh.master")
# ============================================================

gwh:
  master:

    # ==========================================================
    # PIK (Picking Key) Field Definitions  (1-7)
    # ==========================================================
    # Legacy: cm/cmpik/dto/GwhCmpikDTO.java (38 fields)
    # Table:  GWH_TM_PIK
    # Keys:   PIK_CPNY_COD, PIK_WHS_COD, PIK_CUST_COD, PIK_NUM
    #
    # PIK columns appear in: AVD_PIK1-7, AVR_PIK1-7, SPD_PIK1-7,
    #   SPR_PIK1-7, SPPD_PIK1-7, ST_PIK1-7, STKH_PIK1-7
    # All NVARCHAR2(60)
    # dataType: STRING | DATE | NUMBER
    # ==========================================================
    pik:
      slots:
        - slot: 1
          columnSuffix: PIK1
          label: "Lot Number"
          labelJa: "ロット番号"
          enabled: true
          required: false
          dataType: STRING
          maxLength: 60
          allocationKey: true
          description: "Manufacturer lot or batch number for stock allocation"

        - slot: 2
          columnSuffix: PIK2
          label: "Expiry Date"
          labelJa: "賞味期限"
          enabled: true
          required: false
          dataType: DATE
          maxLength: 60
          allocationKey: true
          description: "Product expiry or best-before date; drives FEFO allocation"

        - slot: 3
          columnSuffix: PIK3
          label: "Serial Number"
          labelJa: "シリアル番号"
          enabled: false
          required: false
          dataType: STRING
          maxLength: 60
          allocationKey: true
          description: "Individual item serial number for serialized stock control"

        - slot: 4
          columnSuffix: PIK4
          label: "Purchase Order No"
          labelJa: "発注番号"
          enabled: true
          required: false
          dataType: STRING
          maxLength: 60
          allocationKey: false
          description: "Customer PO reference, carried from arrival through shipping"

        - slot: 5
          columnSuffix: PIK5
          label: "Production Date"
          labelJa: "製造日"
          enabled: false
          required: false
          dataType: DATE
          maxLength: 60
          allocationKey: false
          description: "Date of manufacture; reference only"

        - slot: 6
          columnSuffix: PIK6
          label: "Country of Origin"
          labelJa: "原産国"
          enabled: false
          required: false
          dataType: STRING
          maxLength: 60
          allocationKey: false
          description: "ISO country code of product origin; reference only"

        - slot: 7
          columnSuffix: PIK7
          label: "Custom Reference"
          labelJa: "カスタム参照"
          enabled: false
          required: false
          dataType: STRING
          maxLength: 60
          allocationKey: false
          description: "Customer-specific free-text reference field"

      # --- Picking master-level defaults (GWH_TM_PIK) ---
      defaults:
        useFlag: "1"                    # PIK_USE_FLG
        typeKind: "01"                  # PIK_TYPE_KND: picking type
        singleGroupDigit: ""            # PIK_SGDG: single-group digit
        inputFormKind: "01"             # PIK_IPFM_KND: input form kind
        allocationPartKind: "01"        # PIK_ALPT_KND: allocation part kind
        inputListKind: "01"             # PIK_IPLT_KND: input list kind
        displayShippingFlag: "0"        # PIK_DSSP_FLG
        autoFlag: "0"                   # PIK_AUTO_FLG
        duplicateDetailFlag: "0"        # PIK_DUDT_FLG
        availabilitySortKind: "01"      # PIK_AVSC_KND
        pickingSortKind: "01"           # PIK_PISC_KND
        packageSortKind: "01"           # PIK_PASC_KND
        locationSortKind: "01"          # PIK_LOSC_KND
        locationCodeSortKind: "01"      # PIK_LCSC_KND
        releaseSortKind: "01"           # PIK_RLSC_KND
        format: ""                      # PIK_FMT

      # --- Barcode settings (per picking definition) ---
      barcode:
        barcodeKind: ""                 # PIK_BARL_KIND
        startPosition: 0                # PIK_STRP
        fieldLength: 0                  # PIK_LENF
        separator: ""                   # PIK_SPRT
        positionValue: ""               # PIK_POSV

