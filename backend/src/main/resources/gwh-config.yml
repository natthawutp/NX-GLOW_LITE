        allocatePriorityKind: "01"      # CUST_ALPR_KND
        allocatePriorityPikKind: "01"   # CUST_ALPR_PIK_KND
        getKind: "01"                   # CUST_GET_KND
        subInventoryEnabled: "0"        # CUST_SBIV_FLG
